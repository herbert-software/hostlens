# Recording-lane scenario orchestration for service-inspector-contract fixtures.
#
# This compose file is the SINGLE source of service-version + topology + abnormal
# scenario orchestration for the wave-2 service inspectors (redis / mysql). It is
# used ONLY by the `_record_*.py` recording entry points (groups B/C) to bring up
# real services, capture ReplayTarget fixtures, then tear down. It is NEVER part
# of day-to-day CI — CI replays the recorded fixtures offline (design D-5).
#
# Image tags are pinned (design D-5 / proposal Failure Mode 4: "镜像固定
# digest/patch 版本") so a re-record reproduces byte-identical baselines. wave-2a
# NEW images (postgres / nginx) are pinned by @sha256 digest; the base-spike
# redis/mysql images remain patch-level, which is the already-archived change's
# convention. Bump deliberately, never float a major/minor tag.
#
# Services, named so the recorder groups can address them directly:
#   redis           — healthy single instance, no auth (PROVEN client path)
#   redis-abnormal  — low maxmemory + noeviction → fill to used_pct >= 95
#                     (semantic-abnormal fixture, D-4)
#   mysql           — healthy single instance (NEW client path)
#   mysql-abnormal  — low max-connections → saturate connections to used_pct
#                     over threshold (semantic-abnormal fixture, D-4)
#   postgres        — healthy single instance (NEW client path, psql + PGPASSWORD)
#   postgres-lowconn— low max_connections=10 → hold a few connections to push
#                     pg_stat_activity count / max_connections over the DEFAULT
#                     threshold (semantic-abnormal fixture, D-3)
#   nginx           — healthy single instance with a stub_status location for
#                     `nginx.health` (curl probe — D-5; NOT systemctl, no systemd
#                     in a compose container)
#
# === wave-2a cross-group recording conventions (G3 postgres / G5 nginx) ===
# postgres / postgres-lowconn:
#   * Both reference ${HOSTLENS_PG_ROOT_PW:?...}; the recorder
#     (`_compose_record.POSTGRES_ROOT_PW`) exports HOSTLENS_PG_ROOT_PW into the
#     compose subprocess env so the `:?` interpolation resolves at parse time
#     (symmetric with HOSTLENS_MYSQL_ROOT_PW). G3's recorder injects the SAME
#     POSTGRES_ROOT_PW value as HOSTLENS_POSTGRES_PASSWORD (user=postgres) for
#     healthy / finding-trigger / semantic-abnormal.
# nginx:
#   * Container listens on 80, published to host 18080.
#   * stub_status path is `/stub_status` (leading `/`, no trailing slash).
#   * G5's `nginx.health` recording uses HOST curl (the host has /usr/bin/curl,
#     the alpine container does not): `curl -fsS http://127.0.0.1:18080/stub_status`.
#   * `nginx -t` invalid-config fixture for `nginx.config_test` (G5
#     semantic-abnormal): see `nginx/bad.conf` — a deliberately INVALID config
#     whose `nginx -t` stderr naturally contains quotes / backslash / newline (to
#     exercise the `jq -n --arg` escaping in task 5.5). It is NOT mounted as a
#     live config (would break startup); G5 mounts it on demand via
#     `docker run --rm -v .../nginx/bad.conf:/tmp/bad.conf:ro nginx@sha256:814a8e88…
#      nginx -t -c /tmp/bad.conf` (rc=1, stderr with quotes/backslash/newline).
#
# Groups B/C drive these with, e.g.:
#   docker compose -f tests/inspectors/compose/docker-compose.yml up -d redis
#   docker exec <project>-redis-1 redis-cli PING
# (or via the shared `_compose_record.py` helper which wraps up + readiness poll
# + a docker-exec ExecutionTarget). See `_compose_record.py` for the contract.
#
# Readiness is expressed as a healthcheck on each service (redis PING /
# mysqladmin ping) so the recording entry points poll `docker inspect` health
# instead of a fixed `sleep` (design D-5 / Operational risk: "禁固定 sleep 竞态").
#
# Secrets: the healthy instances run WITHOUT auth on purpose — the redis/mysql
# inspectors declare HOSTLENS_REDIS_PASSWORD / HOSTLENS_MYSQL_PWD secrets, and the
# recording entry points export an EMPTY value (`HOSTLENS_REDIS_PASSWORD=`) so the
# preflight secret-presence gate passes while the collector takes its no-auth
# branch (design D-3). The access-denied fixture (group C) is recorded against
# `mysql` with a deliberately WRONG password value, not against a no-auth server.

services:
  redis:
    image: redis:7.4.2-alpine
    command: ["redis-server", "--save", ""]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis-abnormal:
    image: redis:7.4.2-alpine
    # Tiny maxmemory + noeviction: writing past the limit drives used_memory
    # toward maxmemory so used_pct >= 95 (real high-memory state for the
    # semantic-abnormal fixture, NOT a lowered inspector threshold — D-4).
    command:
      - "redis-server"
      - "--save"
      - ""
      - "--maxmemory"
      - "2mb"
      - "--maxmemory-policy"
      - "noeviction"
    ports:
      - "16380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.0.40
    environment:
      MYSQL_ROOT_PASSWORD: ${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}
      MYSQL_DATABASE: hostlens
    ports:
      - "13306:3306"
    healthcheck:
      # mysqladmin ping returns success once the server accepts connections.
      # Use the root password env so the ping authenticates on 8.0.
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-p${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}"
      interval: 2s
      timeout: 4s
      retries: 45

  postgres:
    image: postgres@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    environment:
      POSTGRES_PASSWORD: ${HOSTLENS_PG_ROOT_PW:?recorder must export HOSTLENS_PG_ROOT_PW}
      POSTGRES_DB: hostlens
    ports:
      - "15432:5432"
    healthcheck:
      # pg_isready ships in postgres:16-alpine; success once the server accepts
      # connections to the seeded `hostlens` database.
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "hostlens"]
      interval: 2s
      timeout: 4s
      retries: 45

  postgres-lowconn:
    image: postgres@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    # max_connections=10 is low enough that a handful of held connections plus
    # postgres' own background processes push count(*) FROM pg_stat_activity / 10
    # over the DEFAULT critical threshold (real high-connection state — D-3,
    # NOT a lowered inspector threshold).
    command: ["postgres", "-c", "max_connections=10"]
    environment:
      POSTGRES_PASSWORD: ${HOSTLENS_PG_ROOT_PW:?recorder must export HOSTLENS_PG_ROOT_PW}
      POSTGRES_DB: hostlens
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "hostlens"]
      interval: 2s
      timeout: 4s
      retries: 45

  nginx:
    image: nginx@sha256:814a8e88df978ade80e584cc5b333144b9372a8e3c98872d07137dbf3b44d0e4
    # Overlay the whole default server block (default.conf) so the stub_status
    # location lives in the SAME `server { listen 80; }` as the default site —
    # avoids a duplicate server block. The host probes /stub_status via host
    # curl on 18080 (D-5); readiness uses busybox wget (alpine has no curl).
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/stub_status"]
      interval: 2s
      timeout: 4s
      retries: 30

  mysql-abnormal:
    image: mysql:8.0.40
    # max-connections=5 is tiny enough that a handful of held client
    # connections saturates the server → used_connections/max_connections over
    # the default threshold (real high-connection state — D-4).
    command: ["--max-connections=5"]
    environment:
      MYSQL_ROOT_PASSWORD: ${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}
      MYSQL_DATABASE: hostlens
    ports:
      - "13307:3306"
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-p${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}"
      interval: 2s
      timeout: 4s
      retries: 45

  # === wave-2b additions ===
  # mysql-slowlog — slow_query_log=ON + log_output=TABLE + long_query_time=1, so
  # `mysql.slow_queries` sees an ENABLED monitoring state (slow_log_monitoring_enabled
  # = true) and the `mysql.slow_log` TABLE accumulates rows for any query slower than
  # 1s. The recorder runs real `SELECT SLEEP(2)` queries (each > long_query_time → a
  # real slow event) to drive the semantic-abnormal fixture's slow_query_count over
  # the DEFAULT warn_count (NOT a lowered inspector threshold; long_query_time=1 is a
  # realistic slow gate, NOT the banned long_query_time=0 noise trick — tasks 1.3 / D-2).
  # The monitoring-disabled fixture is recorded against the plain `mysql` service
  # above (slow_query_log defaults OFF → slow_log_monitoring_enabled=false → warning).
  mysql-slowlog:
    image: mysql:8.0.40
    command: ["--slow-query-log=ON", "--log-output=TABLE", "--long-query-time=1"]
    environment:
      MYSQL_ROOT_PASSWORD: ${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}
      MYSQL_DATABASE: hostlens
    ports:
      - "13308:3306"
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-p${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}"
      interval: 2s
      timeout: 4s
      retries: 45

  # nginx-errorrate — writes a REAL access.log for `nginx.error_rate`. The official
  # nginx image symlinks /var/log/nginx/access.log -> /dev/stdout; a `tmpfs` mount at
  # /var/log/nginx shadows that symlinked dir so nginx writes access.log as a real
  # regular file the inspector can read via the static path (tasks 1.1 / D-4). The
  # config adds a `/err500` location returning 500 so the recorder generates REAL 5xx
  # traffic (host curl) for the semantic-abnormal fixture. The stock http-level
  # `access_log /var/log/nginx/access.log main;` logs in the default `main` format
  # (status code at field 9 — matches the inspector's status_field default).
  nginx-errorrate:
    image: nginx@sha256:814a8e88df978ade80e584cc5b333144b9372a8e3c98872d07137dbf3b44d0e4
    volumes:
      - "./nginx/error_rate.conf:/etc/nginx/conf.d/default.conf:ro"
    tmpfs:
      - /var/log/nginx
    ports:
      - "18081:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 2s
      timeout: 4s
      retries: 30

  # === replication spike (wave-2) ===
  # redis-repl-master / redis-repl-replica — master+replica topology for
  # `redis.replication_lag` fixture recording. Both pin --repl-ping-replica-period
  # 10 + a large --repl-timeout so DEBUG SLEEP on the master does NOT flip the
  # replica link to down (stale vs down semantic separation — design D-5). Master
  # alone gets --enable-debug-command yes (Redis 7.x defaults DEBUG off; recording
  # lane only). Readiness is the compose healthcheck (redis-cli PING), polled via
  # wait_healthy / wait_until — never a fixed sleep.
  redis-repl-master:
    image: redis:7.4.2-alpine
    command:
      - "redis-server"
      - "--repl-ping-replica-period"
      - "10"
      - "--repl-timeout"
      - "3600"
      - "--enable-debug-command"
      - "yes"
    ports:
      - "16381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis-repl-replica:
    image: redis:7.4.2-alpine
    command:
      - "redis-server"
      - "--replicaof"
      - "redis-repl-master"
      - "6379"
      - "--repl-ping-replica-period"
      - "10"
      - "--repl-timeout"
      - "3600"
    ports:
      - "16382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 1s
      timeout: 3s
      retries: 30

  # === wave-2c mysql replication ===
  # mysql-repl-primary / mysql-repl-replica — primary+replica topology for
  # `mysql.replication_lag` fixture recording (GTID auto-position). The recorder
  # creates a replication account on the primary, points the replica at it with
  # CHANGE REPLICATION SOURCE TO ... SOURCE_AUTO_POSITION=1; START REPLICA, and
  # polls Replica_IO_Running/Replica_SQL_Running via wait_until (never a fixed
  # sleep). mysql:8.0.40 gives the Replica_*/Seconds_Behind_Source column names.
  mysql-repl-primary:
    image: mysql:8.0.40
    command: ["--server-id=1", "--log-bin", "--gtid-mode=ON", "--enforce-gtid-consistency=ON"]
    environment:
      MYSQL_ROOT_PASSWORD: ${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}
      MYSQL_DATABASE: hostlens
    ports:
      - "13310:3306"
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-p${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}"
      interval: 2s
      timeout: 4s
      retries: 45

  mysql-repl-replica:
    image: mysql:8.0.40
    command: ["--server-id=2", "--gtid-mode=ON", "--enforce-gtid-consistency=ON", "--read-only"]
    environment:
      MYSQL_ROOT_PASSWORD: ${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}
      MYSQL_DATABASE: hostlens
    ports:
      - "13311:3306"
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-uroot"
        - "-p${HOSTLENS_MYSQL_ROOT_PW:?recorder must export HOSTLENS_MYSQL_ROOT_PW}"
      interval: 2s
      timeout: 4s
      retries: 45

  # === wave-3 postgres replication ===
  # pg-repl-primary + 3 standbys — primary-side topology for `postgres.replication_lag`
  # fixture recording. The recorder brings up the SHARED project, appends
  # `host replication all all trust` to the primary's pg_hba.conf + reloads (trust
  # only adds `host all all all trust`, NOT a replication line — gate-probed), then
  # the standbys' `until pg_basebackup` retry loop succeeds. 3 standbys give the
  # multi_replica single-carrier topology (>=2 distinct streaming + 1 backup walsender;
  # spec requires max & AND both non-trivial in ONE fixture). wal_keep_size=1024MB
  # retains WAL so a network-disconnected standby can catch up via streaming (the
  # non-streaming row via throttled pg_basebackup -> holdable state='backup'
  # (catchup too transient on fast loopback). recovery_min_apply_delay drives the lagging fixture (streaming
  # + growing replay_lag). pg16 column names: pg_stat_replication.{state,replay_lag}.
  pg-repl-primary:
    image: postgres@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=10", "-c", "wal_keep_size=1024MB"]
    environment:
      POSTGRES_PASSWORD: ${HOSTLENS_PG_ROOT_PW:?recorder must export HOSTLENS_PG_ROOT_PW}
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: hostlens
    ports:
      - "15440:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "hostlens"]
      interval: 2s
      timeout: 4s
      retries: 45

  pg-repl-standby:
    image: postgres@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    user: postgres
    # Build the standby via pg_basebackup -Xs -R (writes standby.signal +
    # primary_conninfo), retrying until the primary's replication hba line is in
    # place; then exec the entrypoint (populated PGDATA -> skips initdb -> starts
    # in recovery). docker stop/start would re-run this and re-basebackup (state
    # stuck at 'backup') — the recorder induces a non-streaming row via a throttled
    # pg_basebackup (holdable 'backup' walsender) instead.
    command: &pg_standby_cmd
      - bash
      - -c
      - "rm -rf /var/lib/postgresql/data/* ; until pg_basebackup -h pg-repl-primary -U postgres -D /var/lib/postgresql/data -Xs -R; do echo 'basebackup retry (waiting for primary replication hba)'; sleep 2; done ; exec docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 4s
      retries: 60

  pg-repl-standby-2:
    image: postgres@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    user: postgres
    command: *pg_standby_cmd
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 4s
      retries: 60

  pg-repl-standby-3:
    image: postgres@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
    user: postgres
    command: *pg_standby_cmd
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 4s
      retries: 60
