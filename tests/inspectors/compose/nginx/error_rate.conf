# Recording-lane nginx site for the wave-2b `nginx.error_rate` fixture.
#
# Mounted as /etc/nginx/conf.d/default.conf on the `nginx-errorrate` compose
# service (see docker-compose.yml). Two locations let the recorder generate a
# controlled mix of 2xx and 5xx traffic:
#   * `/`        -> 200  (healthy / baseline requests)
#   * `/err500`  -> 500  (real server errors for the semantic-abnormal fixture)
#
# The container mounts a `tmpfs` at /var/log/nginx, shadowing the official image's
# /var/log/nginx/access.log -> /dev/stdout symlink, so nginx writes access.log as a
# REAL regular file. The stock http-level `access_log /var/log/nginx/access.log
# main;` (from nginx.conf) logs in the default `main` format — the HTTP status code
# is the 9th whitespace-delimited field, matching the `nginx.error_rate` inspector's
# `status_field` default of 9. The inspector reads this real file via the static
# path /var/log/nginx/access.log (tasks 1.1 / design D-4).
server {
    listen 80;
    server_name localhost;

    location / {
        return 200 "ok\n";
    }

    location /err500 {
        return 500 "err\n";
    }
}
