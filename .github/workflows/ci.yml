name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR / branch (rapid pushes no longer stack).
# Key on the PR number for pull_request events (globally unique, fork-safe — two
# forks sharing a head_ref like `patch-1` won't cancel each other) and on the ref
# for pushes to main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Lightweight gate: skip the heavy build/test steps for doc-only changes
  # (markdown / docs/ / openspec/). The matrix `ci` job still RUNS and reports
  # the required `lint + type + test (pyX)` status checks (green in ~20s when
  # there is no code to test), so branch-ruleset required checks stay satisfied
  # without a ruleset edit. Any non-doc file (src/, tests/, pyproject, .github/…)
  # → code=true → full CI. Detection failure / unknown base → default code=true
  # (never skip testing real code).
  detect:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: f
        run: |
          base='${{ github.event.pull_request.base.sha || github.event.before }}'
          head='${{ github.sha }}'
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; echo "no usable base -> full CI"; exit 0
          fi
          files=$(git diff --name-only "$base" "$head") || { echo "code=true" >> "$GITHUB_OUTPUT"; echo "diff failed -> full CI"; exit 0; }
          echo "changed files:"; printf '%s\n' "$files"
          if printf '%s\n' "$files" | grep -qvE '(\.md$|^docs/|^openspec/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"; echo "-> code changed: full CI"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"; echo "-> doc-only: skip heavy steps"
          fi

  ci:
    name: lint + type + test (py${{ matrix.python-version }})
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        if: needs.detect.outputs.code == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip (keep runner's pip ahead of known CVEs)
        if: needs.detect.outputs.code == 'true'
        run: python -m pip install --upgrade pip

      - name: Install project (editable) with dev extras
        if: needs.detect.outputs.code == 'true'
        run: pip install -e ".[dev]"

      # lint / type / cassette-lint / audit are Python-version-independent — run
      # them ONCE (on 3.12) instead of on every matrix leg. The 3.11 job still
      # runs pytest (the only version-sensitive step) and still reports its
      # required status check.
      - name: Ruff lint
        if: needs.detect.outputs.code == 'true' && matrix.python-version == '3.12'
        run: ruff check .

      - name: Ruff format check
        if: needs.detect.outputs.code == 'true' && matrix.python-version == '3.12'
        run: ruff format --check .

      - name: Mypy strict type check
        if: needs.detect.outputs.code == 'true' && matrix.python-version == '3.12'
        run: mypy --strict src/

      - name: Cassette lint (secrets + MessageResponse schema)
        if: needs.detect.outputs.code == 'true' && matrix.python-version == '3.12'
        run: python scripts/cassette_lint.py

      - name: Pytest with coverage
        if: needs.detect.outputs.code == 'true'
        run: pytest --cov=hostlens --cov-report=term

      - name: Dependency vulnerability audit (pip-audit)
        if: needs.detect.outputs.code == 'true' && matrix.python-version == '3.12'
        run: pip-audit --skip-editable
