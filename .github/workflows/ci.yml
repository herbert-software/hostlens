name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: lint + type + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (editable) with dev extras
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict type check
        run: mypy --strict src/

      - name: Cassette lint (secrets + MessageResponse schema)
        run: python scripts/cassette_lint.py

      - name: Pytest with coverage
        run: pytest --cov=hostlens --cov-report=term

      - name: Dependency vulnerability audit (pip-audit)
        run: pip-audit --skip-editable
