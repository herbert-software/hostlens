name: go.heap
version: 1.0.0
description: >
  Report Go runtime heap usage from a service's pprof endpoint. Requires the
  target process to expose net/http/pprof at pprof_endpoint (IPv4 / hostname
  host:port; IPv6 literals are out of scope). The collector reads the
  runtime.MemStats trailer of /debug/pprof/heap?debug=1 and extracts the
  stable HeapInuse / HeapAlloc byte counters (anchored by field NAME, not by
  line position, so they stay correct across Go versions). A heap_inuse_bytes
  approaching the process limit signals memory pressure. If the endpoint is
  unreachable or does not expose pprof, the collector fails loud
  (status=exception) rather than fabricating a healthy heap.
tags: [go, runtime]
targets: [local, ssh, docker]
requires_capabilities: [shell]
requires_binaries: [curl]
privilege: none

# parameters 必须是完整 JSON Schema（type: object + properties + additionalProperties:
# false）——loader 的 `_param_type_lookup` 只从 `properties` 建参数表，缺 wrapper 会让
# 参数对 loader 不可见、`| sh` 注入门与 pattern 约束双双静默失效。
parameters:
  type: object
  properties:
    pprof_endpoint:
      type: string
      pattern: "^[A-Za-z0-9._-]+:[0-9]{1,5}$"   # host:port, 收紧取值域
      default: "127.0.0.1:6060"
    # heap_inuse_bytes 阈值，默认 1 GiB。finding 只对已就绪标量做比较。
    threshold_bytes:
      type: integer
      default: 1073741824
  additionalProperties: false

collect:
  # /debug/pprof/heap?debug=1 末尾附 runtime.MemStats 文本转储，含命名行
  # `# HeapInuse = N` / `# HeapAlloc = N`（字段名稳定，跨 Go 版本按 NAME 锚定，
  # 非按行位——后者会随版本静默错位）。HeapInuse=正在使用的堆 span 字节，
  # HeapAlloc=活跃对象字节，二者是 best-effort 稳定信号；finding 只锁
  # heap_inuse_bytes，heap_alloc_bytes 作附加 evidence。
  # pprof_endpoint 是 string 参数，必经 `| sh` 引用（loader 对 string 参数强制，
  # pattern 不豁免）——charset 已被 pattern 收紧，shlex.quote 对合法值是恒等变换。
  # FAIL-LOUD（POSIX/dash-safe，沿用既有 builtin 约定——禁 `set -o pipefail`，
  # 它非 POSIX、dash(/bin/sh on Debian/Ubuntu)会整脚本 abort exit 2 → 健康目标
  # 也永久假 exception）：先 raw-capture curl 输出并在 curl 上判退出码（管道前），
  # 再单独喂 awk 按字段名抽取。`heap_inuse_bytes` 是 finding 阈值的**主信号**，
  # 缺失即 `[ -n "$inuse" ] || exit 1` fail-loud（D-6.1 非空二道门，兜「curl
  # exit 0 但无 HeapInuse 行」）。`heap_alloc_bytes` 是**附加 evidence**（finding
  # 不阈值它）——故它缺失时**不**拖垮整个采集：只在抓到时附进输出，抓不到则
  # 省略该键、仍以可用的 inuse 读数产 ok（健康端点不因附加字段缺失被误判
  # exception）。real Go MemStats 总同时含两字段，此分支是稳健性兜底。
  command: |
    raw=$(curl -fsS --max-time 5 "http://{{ pprof_endpoint | sh }}/debug/pprof/heap?debug=1" 2>/dev/null) || exit 1
    inuse=$(printf '%s\n' "$raw" | awk '/^# HeapInuse = / { print $4; exit }')
    [ -n "$inuse" ] || exit 1
    alloc=$(printf '%s\n' "$raw" | awk '/^# HeapAlloc = / { print $4; exit }')
    if [ -n "$alloc" ]; then
      printf '{"heap_inuse_bytes":%s,"heap_alloc_bytes":%s}' "$inuse" "$alloc"
    else
      printf '{"heap_inuse_bytes":%s}' "$inuse"
    fi
  timeout_seconds: 10

parse:
  format: json

output_schema:
  type: object
  properties:
    heap_inuse_bytes: { type: integer }
    heap_alloc_bytes: { type: integer }
  # Only the primary signal is required; heap_alloc_bytes is supplemental
  # evidence and is omitted (not exception) when pprof doesn't surface it.
  required: [heap_inuse_bytes]
  additionalProperties: false

findings:
  # Message thresholds only the primary inuse signal; it must NOT reference
  # heap_alloc_bytes (which may be absent — `.format` would KeyError). The alloc
  # evidence, when present, stays in the output JSON for the report/evidence layer.
  - when: "heap_inuse_bytes > threshold_bytes"
    severity: warning
    message: "Go 堆 inuse {heap_inuse_bytes} 字节超过阈值 {threshold_bytes}"
