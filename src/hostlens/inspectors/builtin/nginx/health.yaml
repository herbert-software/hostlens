name: nginx.health
version: 1.0.0
# Service-inspector-suite wave-2a probe: nginx liveness via stub_status. This is
# a NO-FINDING failure-tristate inspector — its whole job is "is the service
# up?". The contract's dual-track mechanical gate ("only inspectors whose
# `findings` list is NON-EMPTY require a semantic-abnormal fixture") therefore
# does NOT apply here (`findings: []`); instead the suite spec requires it carry
# at least two snapshots proving the up→ok / down→exception tristate mapping.
#
# WHY curl, NOT `systemctl is-active` (design D-5): the recording lane is a
# docker-compose container with no systemd. `systemctl` would hit an unreachable
# D-Bus and exit non-zero ALWAYS — collapsing the up state into `exception` too,
# making the up/down distinction unrecordable. So liveness is probed by GETting
# the stub_status endpoint with curl: reachable + parseable → exit 0 → ok;
# nginx down / endpoint unreachable / stub_status text unparseable → curl (or the
# awk extraction) exits non-zero with empty stdout → status=exception (FAIL-LOUD,
# never fabricates a healthy object — a dead backend must not read as ok).
#
# INJECTION SAFETY (three-piece contract): `host` is pattern-bounded
# `^[a-zA-Z0-9._-]+$` and flows through `| sh`; `port` is an int (shell cannot
# evaluate it as text, so no `| sh`); `stub_status_path` is bounded by a TIGHTER
# pattern `^/[A-Za-z0-9/_-]+$` (self-leading `/`, no `..`/scheme/query metachars)
# and also flows through `| sh`. The URL template writes NO literal `/` after
# `{{ port }}` — `stub_status_path` carries its own leading slash, so writing a
# literal `/` would render `//path` which 404s when merge_slashes is off.
description: >-
  Nginx 健康探活(单实例,no-finding 失败三态)。经 curl GET stub_status endpoint 判活
  ——可达且可解析 → status=ok;nginx 停 / endpoint 不可达 / stub_status 文本抽不出字段
  → curl 或抽取非零退出 + 空 stdout → status=exception(fail-loud,绝不伪造健康)。
  采集路径用 curl 而非 systemctl is-active(录制 lane 容器无 systemd,systemctl 恒
  非零会让 up 态也落 exception,见 design D-5)。无连接 secret。缺 curl → requires_unmet。
tags: [nginx, web, service, health]
targets: [local, ssh, docker]
requires_capabilities: [shell]
requires_binaries: [curl]
secrets: []
privilege: none

parameters:
  type: object
  properties:
    host:
      type: string
      pattern: "^[a-zA-Z0-9._-]+$"   # blocks shell injection in the URL host
      default: "127.0.0.1"
    port:
      type: integer
      minimum: 1
      maximum: 65535
      default: 80
    stub_status_path:
      type: string
      # Self-leading `/`; no `..`/scheme/query metachars — tightened per D-5.
      pattern: "^/[A-Za-z0-9/_-]+$"
      default: "/stub_status"
  additionalProperties: false

collect:
  # All extraction happens in the collector (Authoring Contract rule 1): curl
  # fetches the stub_status text, awk lifts the integer from the
  # `Active connections: N` line, and `printf` folds it into a top-level JSON
  # object so parse.format=json sees a dict. The Finding DSL is empty — this is a
  # no-finding liveness probe.
  #
  # FAIL-LOUD (rule 8): `curl -fsS` must succeed (so a non-2xx or unreachable
  # endpoint exits non-zero), AND the awk must lift a bare integer; otherwise the
  # collector exits 1 with empty stdout → parse exception → status=exception. A
  # dead nginx never fabricates `{"healthy":true,...}`.
  #
  # `--max-time 5` < `timeout_seconds: 15` (Operational Limits): the client-side
  # cap fires before the collector timeout so an unreachable endpoint fails fast
  # as `exception`, not the orthogonal transport-layer `timeout`.
  #
  # NOTE: no literal `/` after `{{ port }}` — `stub_status_path` carries its own
  # leading slash (see header), so `http://{{ host }}:{{ port }}{{ path }}`
  # renders `http://127.0.0.1:80/stub_status`, never `//stub_status`.
  command: |
    out=$(curl -fsS --max-time 5 http://{{ host | sh }}:{{ port }}{{ stub_status_path | sh }}) || { echo "nginx stub_status unreachable" >&2; exit 1; }
    n=$(printf '%s' "$out" | awk '/^Active connections:/{print $3}')
    case "$n" in ''|*[!0-9]*) echo "active_connections non-numeric: $n" >&2; exit 1;; esac
    printf '{"healthy":true,"active_connections":%d}' "$n"
  timeout_seconds: 15   # curl --max-time 5 < collect timeout (Operational Limits)

parse:
  format: json

output_schema:
  type: object
  properties:
    healthy:            { type: boolean }
    active_connections: { type: integer }
  required: [healthy, active_connections]
  additionalProperties: false

findings: []
