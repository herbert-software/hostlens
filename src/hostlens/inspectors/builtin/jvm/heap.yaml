name: jvm.heap
version: 1.0.0
description: >-
  Report a JVM's heap utilisation (used / committed occupancy percent)
  from `jstat -gc <pid>`. The target JVM is located by `pid` (integer) or, if
  pid is unset (0), by `process_pattern` resolved through `pgrep`. The
  collector parses jstat's space-separated table by ANCHORING ON COLUMN NAME
  (the header row maps EU/OU/MU/EC/OC/MC etc. → column index) rather than by
  fixed column position, because jstat's column set and order drift across JDK
  versions (8 / 11 / 17 / 21) — positional access would silently misread on a
  different JDK. heap used / committed are summed from the eden / old /
  metaspace columns and the used-over-committed occupancy percent is derived as
  a scalar in the collector (committed = live ceiling; jstat -gc has no -Xmx max
  column, so this is "% of committed" not "% of -Xmx" — vs -Xmx left for later);
  the Finding DSL only thresholds the ready scalar. If any anchored column is
  absent the awk emits empty → the `[ -n "$used" ]` gate fails loud (exception),
  never a field-0 garbage scalar.

  Run prerequisite (documented, not a schema gate): jstat can only attach to a
  JVM owned by the SAME UID as the collector (or root). A cross-user attach is
  refused → jstat exits non-zero → status=exception (an honest "cannot read"
  surface, never a fabricated "heap healthy"). The inspector does NOT auto-sudo
  (privilege: none) — the elevation decision stays with the operator.
tags: [jvm, runtime, heap, jstat]
targets: [local, ssh, docker]
requires_capabilities: [shell]
requires_binaries: [jstat]
privilege: none

# `parameters` MUST be a complete JSON Schema (type: object + properties +
# additionalProperties: false). The loader only builds its parameter table from
# `parameters.properties`; without the wrapper the parameters become invisible
# to the loader and the `| sh` injection gate plus the `pattern` constraint
# would BOTH silently fail. `pid` is an integer (type: integer + minimum) so it
# carries no shell-injection surface and is interpolated bare. `process_pattern`
# is a string and MUST flow through `{{ process_pattern | sh }}`; its `pattern`
# tightens the value domain to a process-name charset (defence in depth).
parameters:
  type: object
  properties:
    pid:
      type: integer
      minimum: 0
      default: 0
    process_pattern:
      type: string
      pattern: "^[A-Za-z0-9._/-]*$"   # `*` not `+`: empty default ("") is the unset sentinel; collector guards `[ -n "$pat" ]`
      default: ""
    max_pct:
      type: integer
      default: 90
  additionalProperties: false

collect:
  # FAIL-LOUD, double-gate (design D-6 / D-6.0 / D-6.1):
  #
  #  (1) POSIX/dash-safe pipe discipline: the collector runs under `/bin/sh -c`
  #      (dash on Debian/Ubuntu). `set -o pipefail` is FORBIDDEN — dash aborts
  #      the whole script (exit 2, empty stdout) on that non-POSIX `set -o`,
  #      which would make a HEALTHY target falsely read as status=exception. So
  #      `jstat` is raw-captured into a variable and its exit code is checked ON
  #      THE jstat COMMAND (before any pipe); the awk that follows (which always
  #      exits 0) can never swallow a jstat failure.
  #
  #  (2) A non-existent / wrong pid → `jstat <pid>` exits non-zero → `|| exit 1`
  #      → status=exception (never a fabricated "heap healthy"). An empty
  #      `pgrep` result (no matching process) ALSO fails loud (`exit 1`) — it is
  #      NOT treated as "0 processes → ok".
  #
  #  (3) Second gate for the JDK 8 jstat exit-0 false-negative: some JDK 8 jstat
  #      builds print an error to stderr yet exit 0 when they cannot read the
  #      target hsperfdata (cross-user attach EACCES / process just exited). So
  #      after extraction we MUST verify the derived scalar is non-empty
  #      (`[ -n "$used" ] || exit 1`) rather than trusting the exit code alone.
  #
  # Column-name anchoring (design D-4): awk first scans the jstat header row to
  # build a name→index map, then reads EU/OU/MU (used) and EC/OC/MC (capacity =
  # committed) by NAME. max is approximated by committed when no max column is
  # exposed (jstat -gc has no max column; committed is the live ceiling jstat
  # reports). The occupancy percent is computed here as a scalar.
  command: |
    pid={{ pid }}
    if [ "$pid" -le 0 ]; then
      pat={{ process_pattern | sh }}
      [ -n "$pat" ] || exit 1
      pid=$(pgrep -f -- "$pat" 2>/dev/null | head -n 1)
      [ -n "$pid" ] || exit 1
    fi
    raw=$(jstat -gc "$pid") || exit 1
    used=$(printf '%s\n' "$raw" | awk '
      NR==1 { for (i=1;i<=NF;i++) col[$i]=i; next }
      NR==2 {
        for (k in needed) if (!(needed[k] in col)) { printf ""; exit }
        u = $(col["EU"]) + $(col["OU"]) + $(col["MU"])
        c = $(col["EC"]) + $(col["OC"]) + $(col["MC"])
        if (c > 0) printf "%.1f", u/c*100; else printf ""
      }
      BEGIN { split("EU OU MU EC OC MC", needed, " ") }')
    [ -n "$used" ] || exit 1
    printf '{"heap_used_pct":%s}' "$used"
  timeout_seconds: 10

parse:
  format: json

output_schema:
  type: object
  properties:
    heap_used_pct: { type: number }
  required: [heap_used_pct]
  additionalProperties: false

findings:
  # The DSL only thresholds the already-derived occupancy scalar — no parsing,
  # no derivation (load-bearing wall 1).
  - when: "heap_used_pct >= 95"
    severity: critical
    message: "JVM heap occupancy at {heap_used_pct}% (>= 95%)"
  - when: "heap_used_pct >= max_pct and heap_used_pct < 95"
    severity: warning
    message: "JVM heap occupancy at {heap_used_pct}% (>= {max_pct}%)"
