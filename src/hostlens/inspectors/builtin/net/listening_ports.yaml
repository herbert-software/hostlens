name: net.listening_ports
version: 1.1.0
description: >-
  Enumerate listening TCP ports from `ss -tlnp` (local address, port, owning
  process) and flag any port bound to a public-facing wildcard address that is
  NOT in the caller-supplied `allowed_ports` whitelist AND whose owning process
  is NOT in the caller-supplied `allowed_processes` whitelist. Process-name
  exemption lets a known daemon (e.g. `tailscaled`, `derper`) bind a wildcard
  port on any number without per-port allowlisting. Membership is exact
  (`snell-server` does not exempt `snell-server-evil`). Linux-only (needs
  iproute2 `ss`); process-name resolution needs the `-p` column, which on a
  non-privileged user may show empty for other users' sockets (documented
  limitation, not an error). A wildcard listener whose process name comes back
  empty (no identity, e.g. another user's socket under a non-privileged probe)
  is conservatively treated as UNexempt â€” `"" not in allowed_processes` is true,
  so it still warns; unattributable wildcard listeners must stay visible.
  `allowed_processes` members are constrained to the charset
  `^[A-Za-z0-9._@-]+$`, so a rare `comm` name containing `:` or parentheses
  (e.g. `postgres:main`) cannot be added to the allowlist â€” by design, the
  pattern keeps the allowlist domain tight (this only constrains allowlist
  members the caller supplies, not the `process` values the inspector collects).
  All extraction happens in awk; the Finding DSL only does membership/threshold
  comparison on the ready `results` array.
tags: [linux, network, listening-ports, tcp, iproute2]
targets: [local, ssh, docker, k8s]
requires_capabilities: [shell]
requires_binaries: [ss, awk]
privilege: none

parameters:
  type: object
  properties:
    # `allowed_ports` is a whitelist of expected listening ports. It is NOT
    # interpolated into the shell command (the comparison is done in the
    # Finding DSL `not in` membership test), so it needs no `| sh`; but it is
    # still pattern-constrained per element for defence-in-depth and to keep
    # the parameter domain tight. Empty default = "every wildcard port is
    # unexpected".
    allowed_ports:
      type: array
      items: { type: integer }
      default: []
    # `allowed_processes` is a whitelist of owning-process names (the `comm`
    # field `ss -tlnp` exposes). Like `allowed_ports` it is NOT interpolated
    # into the shell command â€” the comparison is a Finding DSL `not in`
    # membership test â€” so it needs no `| sh`. The per-element `pattern` is
    # MANDATORY (inspector-authoring-contract: a string-typed array MUST carry
    # `pattern` or `enum` or the manifest fails to load). `^[A-Za-z0-9._@-]+$`
    # covers real daemon names and, via `+` (>= 1 char), rejects the empty
    # string so `allowed_processes: [""]` cannot silently exempt every
    # unattributable wildcard listener.
    allowed_processes:
      type: array
      items: { type: string, pattern: "^[A-Za-z0-9._@-]+$" }
      default: []
  additionalProperties: false

collect:
  # FAIL-LOUD (Authoring Contract rule 8): `ss` failing MUST exit non-zero
  # with empty stdout (â†’ status=exception) rather than emit `{"results":[]}`
  # blessed as "nothing listening". A host with zero listeners (ss succeeds,
  # no data rows) honestly emits `{"results":[]}` â€” distinguishable.
  #
  # `parse.format: json` needs a top-level object, so the per-port records are
  # wrapped in `{"results": [...]}` (`results`, not a parameter name, dodges
  # the output/parameter shadowing trap â€” wall 3). All field extraction (split
  # the `addr:port` Local Address column, pull the process name out of the
  # `users:(("name",pid=N,...))` field, detect wildcard binds) happens in awk
  # (wall 1); the Finding DSL only reads ready scalars.
  command: |
    raw=$(ss -tlnp) || { echo "ss failed" >&2; exit 1; }
    printf '%s\n' "$raw" | awk '
      function esc(s){ gsub(/\\/,"\\\\",s); gsub(/"/,"\\\"",s); return s }
      BEGIN{ printf "{\"results\":["; sep="" }
      NR>1 {
        local=$4
        # port = substring after the last colon; addr = the rest.
        n=split(local, parts, ":"); port=parts[n]
        addr=substr(local, 1, length(local)-length(port)-1)
        wildcard=(addr=="0.0.0.0" || addr=="*" || addr=="[::]" || addr=="::") ? "true" : "false"
        proc=""
        if (match($0, /users:\(\("[^"]+"/)) {
          seg=substr($0, RSTART, RLENGTH)
          sub(/users:\(\(\"/, "", seg); sub(/\"$/, "", seg)
          proc=seg
        }
        printf "%s{\"address\":\"%s\",\"port\":%d,\"wildcard\":%s,\"process\":\"%s\"}",
          sep, esc(addr), port, wildcard, esc(proc)
        sep=","
      }
      END{ printf "]}" }
    ' || exit 1
  timeout_seconds: 10

parse:
  format: json

output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        properties:
          address:  { type: string }
          port:     { type: integer }
          wildcard: { type: boolean }
          process:  { type: string }
        required: [address, port, wildcard, process]
        additionalProperties: false
  required: [results]
  additionalProperties: false

findings:
  # Single for_each binding over the already-built results array; the DSL only
  # does membership (`port not in allowed_ports`) + boolean comparison (wall 1).
  - for_each: "results as p"
    when: "p.wildcard == True and p.port not in allowed_ports and p.process not in allowed_processes"
    severity: warning
    message: "Unexpected public listener on port {p[port]} ({p[address]}, process={p[process]})"
