name: linux.systemd.failed_units
version: 1.0.0
description: List systemd units in the failed state.
tags: [linux, systemd]
targets: [local, ssh]
# Gate on the `systemctl` binary (preflight-probed), NOT the `systemd`
# capability: `systemd` is lazily probed (added only after the first `exec`),
# but preflight checks capabilities before any exec — requiring it makes a
# systemd host fail preflight with `requires_unmet`. See Authoring Contract
# rule 9. `shell` is a static baseline capability and is safe to require.
requires_capabilities: [shell]
requires_binaries: [systemctl, awk]
privilege: none

collect:
  # `systemctl --failed` lists failed units; a single awk pass collects each
  # unit name (first column) and emits BOTH a `failed` array-of-objects AND a
  # `failed_names` join string ("foo.service, bar.service"). The finding
  # message injects `{failed_names}` (a clean human-readable string) rather
  # than `{failed}` — `str.format` on the array would render a Python repr.
  # The empty case still prints a valid top-level object
  # ({"failed":[],"failed_names":""}) so parse_json never crashes (trap b).
  # Each unit name is JSON-string-escaped (backslash FIRST, then double-quote)
  # because systemd unit names may legally carry backslashes (e.g. C-escaped
  # `\x2d` in path/instance-derived names) — emitting them raw would produce
  # invalid JSON and crash parse_json. `$1` is whitespace-split so it never
  # contains tabs/newlines; backslash + quote are the only reachable specials.
  command: |
    systemctl list-units --type=service --state=failed --no-legend --plain 2>/dev/null \
      | awk '
          {
            unit=$1
            if (unit != "") {
              gsub(/\\/, "\\\\", unit)
              gsub(/"/, "\\\"", unit)
              arr[n++]=unit
            }
          }
          END {
            printf "{\"failed\":[";
            for (i=0;i<n;i++) { printf "%s{\"unit\":\"%s\"}", (i?",":""), arr[i] }
            printf "],\"failed_names\":\"";
            for (i=0;i<n;i++) { printf "%s%s", (i?", ":""), arr[i] }
            printf "\"}";
          }'
  timeout_seconds: 10

parse:
  format: json

output_schema:
  type: object
  properties:
    failed:
      type: array
      items:
        type: object
        properties:
          unit: { type: string }
    # `failed_names` is the clean join string the finding message injects.
    failed_names: { type: string }
  required: [failed, failed_names]
  additionalProperties: false

findings:
  # The message uses no `{len(...)}` — Python str.format cannot call
  # functions inside `{}` (it would raise KeyError and skip the rule), so
  # the count stays in the `when` expression only. `{failed_names}` injects
  # the clean comma-joined unit list (e.g. "nginx.service, mysql.service").
  - when: "len(failed) > 0"
    severity: critical
    message: "systemd 失败服务：{failed_names}"
