repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.ambr$'  # syrupy snapshot files use trailing whitespace inside ''' blocks to encode blank lines; auto-stripping breaks byte-equal snapshot comparison
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--strict]
        files: ^src/
        additional_dependencies:
          - pydantic>=2.13.4
          - pydantic-settings>=2.14.1
          - structlog>=25.5.0
          - typer>=0.25.1,<0.26
          - click>=8.4.1,<9
          - asyncssh>=2.18,<3
          - jinja2>=3.1.6,<4
          - jsonschema>=4.20,<5
          - simpleeval>=1.0.7,<2
          - pyyaml>=6.0.3,<7
          - types-PyYAML
          - anthropic>=0.45,<2
